<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>Пёрышко</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Пёрышко">
<meta name="theme-color" content="#0a0c10">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-512.png">
<style>
  :root {
    --bg: #0a0c10;
    --glass: rgba(30, 34, 42, 0.55);
    --glass-hi: rgba(255,255,255,0.07);
    --glass-border: rgba(255,255,255,0.09);
    --accent: #ff8a3d;
    --accent2: #ff5f5f;
    --text: #f1f2f4;
    --text-dim: #8b93a1;
    --bubble-them: rgba(38, 44, 54, 0.85);
    --radius: 20px;
    --danger: #ff6b6b;
    --verified: #4fa8ff;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    overscroll-behavior: none;
  }

  /* ambient liquid background */
  #blobs {
    position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none;
  }
  #blobs span {
    position: absolute; border-radius: 50%; filter: blur(60px); opacity: 0.35;
  }
  #blobs span:nth-child(1) {
    width: 260px; height: 260px; background: var(--accent);
    top: -60px; left: -60px; animation: float1 16s ease-in-out infinite;
  }
  #blobs span:nth-child(2) {
    width: 220px; height: 220px; background: var(--accent2);
    bottom: 10%; right: -60px; animation: float2 20s ease-in-out infinite;
  }
  #blobs span:nth-child(3) {
    width: 180px; height: 180px; background: #4fa8ff;
    bottom: -60px; left: 20%; animation: float3 24s ease-in-out infinite;
  }
  @keyframes float1 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(40px, 60px); } }
  @keyframes float2 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-50px, -30px); } }
  @keyframes float3 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(30px, -50px); } }

  #app-root {
    position: relative; z-index: 1;
    display: flex; flex-direction: column;
    height: 100vh; height: 100dvh;
    max-width: 480px; margin: 0 auto;
  }
  .hidden { display: none !important; }

  /* --- Glass panel base --- */
  .glass {
    background: var(--glass);
    -webkit-backdrop-filter: blur(24px) saturate(160%);
    backdrop-filter: blur(24px) saturate(160%);
    border: 1px solid var(--glass-border);
  }

  /* --- Auth --- */
  #auth-screen {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 14px; padding: 24px; height: 100%;
  }
  #auth-card {
    display: flex; flex-direction: column; align-items: center; gap: 14px;
    padding: 30px 24px; border-radius: 28px; width: 100%; max-width: 320px;
  }
  #auth-screen h1 { font-size: 22px; margin: 0 0 2px; letter-spacing: -0.3px; }
  #auth-screen p.sub { color: var(--text-dim); font-size: 13.5px; text-align: center; margin: 0 0 8px; }
  .field {
    width: 100%; padding: 13px 16px; border-radius: 14px; border: 1px solid var(--glass-border);
    background: rgba(255,255,255,0.05); color: var(--text); font-size: 16px; font-family: inherit;
    transition: border-color 0.2s;
  }
  .field:focus { outline: none; border-color: var(--accent); }
  .btn {
    width: 100%; padding: 13px; border-radius: 14px; border: none;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #1a1200; font-size: 15px; font-weight: 700; font-family: inherit;
    transition: transform 0.15s;
  }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.4; }
  .btn.secondary { background: transparent; color: var(--accent); font-weight: 600; padding: 6px; }
  #auth-error { color: var(--danger); font-size: 13px; text-align: center; min-height: 16px; }
  #auth-loading { color: var(--text-dim); font-size: 13px; }

  /* --- Shared header --- */
  header {
    padding: calc(env(safe-area-inset-top) + 14px) 18px 14px;
    display: flex; align-items: center; gap: 12px;
    flex-shrink: 0; z-index: 2;
    border-radius: 0 0 22px 22px;
  }
  .avatar {
    width: 38px; height: 38px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-weight: 600; font-size: 15px; color: #1a1200; flex-shrink: 0;
    text-transform: uppercase;
  }
  .header-info { flex: 1; min-width: 0; }
  .header-info .name-row { display: flex; align-items: center; gap: 4px; }
  .header-info .name { font-size: 16px; font-weight: 600; }
  .header-info .status { font-size: 12.5px; color: var(--text-dim); transition: color 0.2s; }
  .status.online::before {
    content: ''; display: inline-block; width: 6px; height: 6px;
    background: #4ade80; border-radius: 50%; margin-right: 5px;
  }
  .status.typing { color: var(--accent); }
  .badge-verified {
    width: 14px; height: 14px; border-radius: 50%; background: var(--verified);
    display: inline-flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .badge-verified svg { width: 9px; height: 9px; }
  #logout-btn, .back-btn {
    border: none; background: none; color: var(--text-dim);
    font-size: 13px; font-family: inherit; padding: 6px;
  }
  .back-btn { color: var(--accent); font-size: 22px; font-weight: 600; padding-right: 4px; line-height: 1; }

  /* --- Chat list --- */
  #list-screen { display: flex; flex-direction: column; height: 100%; }
  #user-list { flex: 1; overflow-y: auto; padding: 10px 12px; display: flex; flex-direction: column; gap: 8px; }
  .user-row {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px; border-radius: 18px;
    transition: transform 0.15s, background 0.15s;
  }
  .user-row:active { transform: scale(0.98); background: rgba(255,255,255,0.05); }
  .user-row .name-row { display: flex; align-items: center; gap: 5px; }
  .user-row .name { font-size: 15.5px; font-weight: 600; }
  .user-row .sub { font-size: 12.5px; color: var(--text-dim); }
  .list-empty { margin: auto; text-align: center; color: var(--text-dim); font-size: 14px; padding: 30px; line-height: 1.5; }

  /* --- Chat screen --- */
  #chat-screen { display: flex; flex-direction: column; height: 100%; }
  #messages {
    flex: 1; overflow-y: auto; padding: 16px 14px;
    display: flex; flex-direction: column; gap: 8px;
    -webkit-overflow-scrolling: touch;
  }
  .bubble-row { display: flex; animation: bubbleIn 0.28s cubic-bezier(.2,.9,.3,1.2) both; }
  @keyframes bubbleIn {
    from { opacity: 0; transform: translateY(10px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .bubble-row.me { justify-content: flex-end; }
  .bubble-row.them { justify-content: flex-start; }
  .bubble {
    max-width: 78%; padding: 10px 14px; border-radius: var(--radius);
    font-size: 15px; line-height: 1.35; word-wrap: break-word;
  }
  .bubble.me {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #1a1200; border-bottom-right-radius: 6px;
  }
  .bubble.them {
    background: var(--bubble-them);
    -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px);
    color: var(--text); border-bottom-left-radius: 6px;
    border: 1px solid var(--glass-border);
  }
  .meta-row { display: flex; align-items: center; gap: 3px; margin-top: 3px; justify-content: flex-end; }
  .bubble .time { font-size: 10.5px; opacity: 0.65; }
  .ticks { display: inline-flex; }
  .ticks svg { width: 13px; height: 13px; }
  .tick-sent { opacity: 0.55; }
  .tick-read { color: #1a1200; }
  .empty-state { margin: auto; text-align: center; color: var(--text-dim); font-size: 14px; padding: 20px; line-height: 1.5; }

  .typing-indicator { display: flex; gap: 4px; padding: 10px 14px; }
  .typing-indicator span {
    width: 6px; height: 6px; border-radius: 50%; background: var(--text-dim);
    animation: typingBounce 1.2s infinite ease-in-out;
  }
  .typing-indicator span:nth-child(2) { animation-delay: 0.15s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes typingBounce { 0%, 60%, 100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-4px); opacity: 1; } }

  #input-bar {
    display: flex; align-items: flex-end; gap: 10px;
    padding: 10px 14px calc(env(safe-area-inset-bottom) + 10px);
    flex-shrink: 0; border-radius: 22px 22px 0 0;
  }
  #text-input {
    flex: 1; min-height: 40px; max-height: 120px;
    padding: 10px 14px; border-radius: 20px; border: 1px solid var(--glass-border);
    background: rgba(255,255,255,0.05); color: var(--text); font-size: 15px;
    font-family: inherit; resize: none; outline: none;
  }
  #text-input:focus { border-color: var(--accent); }
  #send-btn {
    width: 40px; height: 40px; border-radius: 50%; border: none;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #1a1200; font-size: 18px; font-weight: 700;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    transition: transform 0.15s;
  }
  #send-btn.sending { animation: sendPulse 0.3s ease; }
  @keyframes sendPulse { 0% { transform: scale(1); } 40% { transform: scale(0.8); } 100% { transform: scale(1); } }
  #send-btn:disabled { opacity: 0.35; }
  #conn-status { font-size: 11.5px; text-align: center; padding: 6px; color: var(--text-dim); flex-shrink: 0; }
  #conn-status.error { color: var(--danger); }
</style>
</head>
<body>

<div id="blobs"><span></span><span></span><span></span></div>

<div id="app-root">

  <!-- AUTH -->
  <div id="auth-screen">
    <div id="auth-card" class="glass">
      <h1 id="auth-title">Вход</h1>
      <p class="sub" id="auth-sub">Войдите, чтобы попасть в чат.</p>
      <input id="email-input" class="field" type="email" placeholder="Email" autocapitalize="off" autocorrect="off">
      <input id="password-input" class="field" type="password" placeholder="Пароль (минимум 6 символов)">
      <div id="auth-error"></div>
      <div id="auth-loading" class="hidden">Подождите…</div>
      <button id="auth-submit" class="btn">Войти</button>
      <button id="auth-toggle" class="btn secondary">Нет аккаунта? Зарегистрироваться</button>
    </div>
  </div>

  <!-- CHAT LIST -->
  <div id="list-screen" class="hidden">
    <header class="glass">
      <div class="avatar" id="my-avatar">Я</div>
      <div class="header-info">
        <div class="name">Чаты</div>
        <div class="status online" id="list-status">подключение...</div>
      </div>
      <button id="logout-btn">Выйти</button>
    </header>
    <div id="user-list"><div class="list-empty">Загружаю список людей…</div></div>
  </div>

  <!-- CHAT -->
  <div id="chat-screen" class="hidden">
    <header class="glass">
      <button class="back-btn" id="back-btn">‹</button>
      <div class="avatar" id="peer-avatar">?</div>
      <div class="header-info">
        <div class="name-row"><span class="name" id="peer-name">—</span><span class="badge-verified hidden" id="peer-badge"><svg viewBox="0 0 24 24" fill="white"><path d="M9 16.2l-3.5-3.5L4 14.2l5 5 11-11-1.5-1.5z"/></svg></span></div>
        <div class="status online" id="chat-status">личный чат</div>
      </div>
    </header>
    <div id="messages"><div class="empty-state">Загружаю сообщения…</div></div>
    <div id="conn-status"></div>
    <div id="input-bar" class="glass">
      <textarea id="text-input" rows="1" placeholder="Сообщение"></textarea>
      <button id="send-btn" disabled>↑</button>
    </div>
  </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
    onAuthStateChanged, signOut
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import {
    getFirestore, collection, addDoc, doc, setDoc, getDoc, query, orderBy, limit,
    onSnapshot, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBsm7o0SwTZCCk3VQc_ZOT_WQokI9EaLpc",
    authDomain: "messenger-c8483.firebaseapp.com",
    projectId: "messenger-c8483",
    storageBucket: "messenger-c8483.firebasestorage.app",
    messagingSenderId: "278474093521",
    appId: "1:278474093521:web:356302e628d7c95fbbe6f0"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const usersRef = collection(db, "users");

  let currentUser = null;
  let unsubUserList = null;
  let unsubMessages = null;
  let unsubChatDoc = null;
  let typingTimeout = null;
  let currentChatId = null;
  let currentChatDocRef = null;
  let peerLastRead = null;

  // ---------- Elements ----------
  const authScreen = document.getElementById('auth-screen');
  const listScreen = document.getElementById('list-screen');
  const chatScreen = document.getElementById('chat-screen');

  const authTitle = document.getElementById('auth-title');
  const authSub = document.getElementById('auth-sub');
  const emailInput = document.getElementById('email-input');
  const passwordInput = document.getElementById('password-input');
  const authError = document.getElementById('auth-error');
  const authLoading = document.getElementById('auth-loading');
  const authSubmit = document.getElementById('auth-submit');
  const authToggle = document.getElementById('auth-toggle');
  const logoutBtn = document.getElementById('logout-btn');
  const myAvatar = document.getElementById('my-avatar');
  const listStatus = document.getElementById('list-status');
  const userListEl = document.getElementById('user-list');

  const backBtn = document.getElementById('back-btn');
  const peerAvatar = document.getElementById('peer-avatar');
  const peerName = document.getElementById('peer-name');
  const peerBadge = document.getElementById('peer-badge');
  const chatStatus = document.getElementById('chat-status');
  const messagesEl = document.getElementById('messages');
  const textInput = document.getElementById('text-input');
  const sendBtn = document.getElementById('send-btn');
  const connStatus = document.getElementById('conn-status');

  let mode = 'login';

  function setMode(m) {
    mode = m;
    authError.textContent = '';
    if (m === 'login') {
      authTitle.textContent = 'Вход';
      authSub.textContent = 'Войдите, чтобы попасть в чат.';
      authSubmit.textContent = 'Войти';
      authToggle.textContent = 'Нет аккаунта? Зарегистрироваться';
    } else {
      authTitle.textContent = 'Регистрация';
      authSub.textContent = 'Придумайте email и пароль — это будет ваш аккаунт.';
      authSubmit.textContent = 'Зарегистрироваться';
      authToggle.textContent = 'Уже есть аккаунт? Войти';
    }
  }
  authToggle.addEventListener('click', () => setMode(mode === 'login' ? 'signup' : 'login'));

  function friendlyError(code) {
    const map = {
      'auth/invalid-email': 'Некорректный email',
      'auth/missing-password': 'Введите пароль',
      'auth/weak-password': 'Пароль слишком короткий (минимум 6 символов)',
      'auth/email-already-in-use': 'Этот email уже зарегистрирован — попробуйте войти',
      'auth/invalid-credential': 'Неверный email или пароль',
      'auth/user-not-found': 'Такого аккаунта нет — попробуйте зарегистрироваться',
      'auth/wrong-password': 'Неверный пароль',
      'auth/too-many-requests': 'Слишком много попыток, подождите немного'
    };
    return map[code] || 'Что-то пошло не так, попробуйте ещё раз';
  }

  authSubmit.addEventListener('click', async () => {
    const email = emailInput.value.trim();
    const password = passwordInput.value;
    authError.textContent = '';
    if (!email || !password) { authError.textContent = 'Заполните email и пароль'; return; }
    authSubmit.disabled = true;
    authLoading.classList.remove('hidden');
    try {
      let cred;
      if (mode === 'signup') {
        cred = await createUserWithEmailAndPassword(auth, email, password);
        await setDoc(doc(db, "users", cred.user.uid), {
          email: cred.user.email,
          name: cred.user.email.split('@')[0],
          verified: false,
          createdAt: serverTimestamp()
        });
      } else {
        await signInWithEmailAndPassword(auth, email, password);
      }
    } catch (e) {
      authError.textContent = friendlyError(e.code);
    } finally {
      authSubmit.disabled = false;
      authLoading.classList.add('hidden');
    }
  });

  logoutBtn.addEventListener('click', () => signOut(auth));

  onAuthStateChanged(auth, (user) => {
    currentUser = user;
    if (unsubUserList) { unsubUserList(); unsubUserList = null; }
    cleanupChat();

    if (user) {
      authScreen.classList.add('hidden');
      chatScreen.classList.add('hidden');
      listScreen.classList.remove('hidden');
      myAvatar.textContent = user.email.slice(0,1);
      showUserList(user);
    } else {
      listScreen.classList.add('hidden');
      chatScreen.classList.add('hidden');
      authScreen.classList.remove('hidden');
      emailInput.value = '';
      passwordInput.value = '';
    }
  });

  function showUserList(user) {
    const q = query(usersRef, orderBy("createdAt", "desc"), limit(100));
    unsubUserList = onSnapshot(q, (snapshot) => {
      listStatus.textContent = 'в сети';
      const others = snapshot.docs.filter(d => d.id !== user.uid);
      if (others.length === 0) {
        userListEl.innerHTML = '<div class="list-empty">Пока нет других зарегистрированных людей. Отправьте ссылку другу — он появится здесь.</div>';
        return;
      }
      userListEl.innerHTML = others.map(d => {
        const u = d.data();
        const initial = (u.name || '?').slice(0,1);
        const badge = u.verified ? '<span class="badge-verified"><svg viewBox="0 0 24 24" fill="white"><path d="M9 16.2l-3.5-3.5L4 14.2l5 5 11-11-1.5-1.5z"/></svg></span>' : '';
        return `<div class="user-row glass" data-uid="${d.id}" data-name="${escapeHtml(u.name || u.email)}" data-verified="${!!u.verified}">
          <div class="avatar">${escapeHtml(initial)}</div>
          <div>
            <div class="name-row"><span class="name">${escapeHtml(u.name || u.email)}</span>${badge}</div>
            <div class="sub">${escapeHtml(u.email)}</div>
          </div>
        </div>`;
      }).join('');
      userListEl.querySelectorAll('.user-row').forEach(row => {
        row.addEventListener('click', () => openChat(row.dataset.uid, row.dataset.name, row.dataset.verified === 'true'));
      });
    }, () => { listStatus.textContent = 'ошибка соединения'; });
  }

  function chatIdFor(uidA, uidB) { return [uidA, uidB].sort().join('_'); }
  function escapeHtml(str) { const div = document.createElement('div'); div.textContent = str; return div.innerHTML; }
  function formatTime(ts) {
    if (!ts) return '';
    const d = ts.toDate ? ts.toDate() : new Date();
    return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
  }

  function cleanupChat() {
    if (unsubMessages) { unsubMessages(); unsubMessages = null; }
    if (unsubChatDoc) { unsubChatDoc(); unsubChatDoc = null; }
    currentChatId = null; currentChatDocRef = null; peerLastRead = null;
  }

  function tickIcon(read) {
    return `<span class="ticks ${read ? 'tick-read' : 'tick-sent'}"><svg viewBox="0 0 24 12" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M1 6l3 3 5-7"/><path d="M9 6l3 3 5-7"/></svg></span>`;
  }

  function renderMessages(docs) {
    if (docs.length === 0) {
      messagesEl.innerHTML = '<div class="empty-state">Пока пусто. Напишите первое сообщение.</div>';
      return;
    }
    messagesEl.innerHTML = docs.map(docu => {
      const m = docu.data();
      const mine = m.senderUid === currentUser.uid;
      const side = mine ? 'me' : 'them';
      let meta = `<span class="time">${formatTime(m.createdAt)}</span>`;
      if (mine) {
        const read = peerLastRead && m.createdAt && m.createdAt.toMillis && peerLastRead.toMillis && m.createdAt.toMillis() <= peerLastRead.toMillis();
        meta = `<span class="time">${formatTime(m.createdAt)}</span>${tickIcon(read)}`;
      }
      return `<div class="bubble-row ${side}">
        <div>
          <div class="bubble ${side}">${escapeHtml(m.text)}</div>
          <div class="meta-row">${meta}</div>
        </div>
      </div>`;
    }).join('');
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function openChat(otherUid, otherName, otherVerified) {
    listScreen.classList.add('hidden');
    chatScreen.classList.remove('hidden');
    peerName.textContent = otherName;
    peerAvatar.textContent = otherName.slice(0,1);
    peerBadge.classList.toggle('hidden', !otherVerified);
    chatStatus.textContent = 'личный чат';
    chatStatus.classList.remove('typing');

    cleanupChat();
    const chatId = chatIdFor(currentUser.uid, otherUid);
    currentChatId = chatId;
    currentChatDocRef = doc(db, "chats", chatId);
    const messagesColRef = collection(db, "chats", chatId, "messages");
    const q = query(messagesColRef, orderBy("createdAt", "asc"), limit(200));

    let lastDocs = [];

    // Mark as read on open
    setDoc(currentChatDocRef, { lastRead: { [currentUser.uid]: serverTimestamp() } }, { merge: true }).catch(()=>{});

    unsubChatDoc = onSnapshot(currentChatDocRef, (snap) => {
      const data = snap.data() || {};
      peerLastRead = data.lastRead ? data.lastRead[otherUid] : null;
      renderMessages(lastDocs);

      const peerTyping = data.typing ? data.typing[otherUid] : null;
      if (peerTyping && peerTyping.toMillis && (Date.now() - peerTyping.toMillis()) < 3000) {
        chatStatus.textContent = 'печатает…';
        chatStatus.classList.add('typing');
      } else {
        chatStatus.textContent = 'личный чат';
        chatStatus.classList.remove('typing');
      }
    });

    unsubMessages = onSnapshot(q, (snapshot) => {
      connStatus.textContent = '';
      connStatus.classList.remove('error');
      lastDocs = snapshot.docs;
      renderMessages(lastDocs);
      // Update read receipt whenever new messages arrive while chat is open
      setDoc(currentChatDocRef, { lastRead: { [currentUser.uid]: serverTimestamp() } }, { merge: true }).catch(()=>{});
    }, (error) => {
      connStatus.textContent = 'Нет связи: ' + error.message;
      connStatus.classList.add('error');
    });

    async function sendMessage() {
      const text = textInput.value.trim();
      if (!text) return;
      sendBtn.classList.add('sending');
      setTimeout(() => sendBtn.classList.remove('sending'), 300);
      sendBtn.disabled = true;
      textInput.value = '';
      textInput.style.height = 'auto';
      clearTyping();
      try {
        await addDoc(messagesColRef, {
          senderUid: currentUser.uid,
          text: text,
          createdAt: serverTimestamp()
        });
      } catch (e) {
        connStatus.textContent = 'Не отправилось: ' + e.message;
        connStatus.classList.add('error');
      }
    }

    function pushTyping() {
      if (!currentChatDocRef) return;
      setDoc(currentChatDocRef, { typing: { [currentUser.uid]: serverTimestamp() } }, { merge: true }).catch(()=>{});
    }
    function clearTyping() {
      if (!currentChatDocRef) return;
      setDoc(currentChatDocRef, { typing: { [currentUser.uid]: null } }, { merge: true }).catch(()=>{});
    }

    textInput.oninput = () => {
      sendBtn.disabled = textInput.value.trim().length === 0;
      textInput.style.height = 'auto';
      textInput.style.height = Math.min(textInput.scrollHeight, 120) + 'px';
      if (typingTimeout) clearTimeout(typingTimeout);
      if (textInput.value.trim().length > 0) {
        pushTyping();
        typingTimeout = setTimeout(clearTyping, 2500);
      } else {
        clearTyping();
      }
    };
    textInput.onkeydown = (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    };
    sendBtn.onclick = sendMessage;
    textInput.value = '';
    sendBtn.disabled = true;
  }

  backBtn.addEventListener('click', () => {
    if (currentChatDocRef && currentUser) {
      setDoc(currentChatDocRef, { typing: { [currentUser.uid]: null } }, { merge: true }).catch(()=>{});
    }
    cleanupChat();
    chatScreen.classList.add('hidden');
    listScreen.classList.remove('hidden');
  });

  setMode('login');
</script>
</body>
</html>
