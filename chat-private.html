<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Пёрышко — чат</title>
<style>
  :root {
    --bg: #12151a;
    --panel: #1b2028;
    --accent: #ff8a3d;
    --accent-soft: #3a2a1f;
    --text: #eceef1;
    --text-dim: #8b93a1;
    --bubble-me: #ff8a3d;
    --bubble-them: #262c36;
    --radius: 20px;
    --danger: #ff6b6b;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    overscroll-behavior: none;
  }
  #app-root {
    display: flex; flex-direction: column;
    height: 100vh; height: 100dvh;
    max-width: 480px; margin: 0 auto;
    background: var(--bg);
  }
  .hidden { display: none !important; }

  /* --- Auth --- */
  #auth-screen {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 14px; padding: 24px; height: 100%;
  }
  #auth-screen h1 { font-size: 22px; margin: 0 0 2px; }
  #auth-screen p.sub { color: var(--text-dim); font-size: 14px; text-align: center; margin: 0 0 10px; max-width: 300px; }
  .field {
    width: 100%; max-width: 300px;
    padding: 13px 16px; border-radius: 14px; border: none;
    background: #262c36; color: var(--text); font-size: 16px; font-family: inherit;
  }
  .btn {
    width: 100%; max-width: 300px;
    padding: 13px; border-radius: 14px; border: none;
    background: var(--accent); color: #1a1200;
    font-size: 15px; font-weight: 700; font-family: inherit;
  }
  .btn:disabled { opacity: 0.4; }
  .btn.secondary { background: transparent; color: var(--accent); font-weight: 600; padding: 6px; }
  #auth-error { color: var(--danger); font-size: 13px; text-align: center; max-width: 300px; min-height: 16px; }
  #auth-loading { color: var(--text-dim); font-size: 13px; }

  /* --- Shared header --- */
  header {
    padding: calc(env(safe-area-inset-top) + 14px) 18px 14px;
    display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid #23282f; flex-shrink: 0;
  }
  .avatar {
    width: 38px; height: 38px; border-radius: 50%;
    background: linear-gradient(135deg, #ff8a3d, #ff5f5f);
    display: flex; align-items: center; justify-content: center;
    font-weight: 600; font-size: 15px; color: #12151a; flex-shrink: 0;
    text-transform: uppercase;
  }
  .header-info { flex: 1; min-width: 0; }
  .header-info .name { font-size: 16px; font-weight: 600; }
  .header-info .status { font-size: 12.5px; color: var(--text-dim); }
  .status.online::before {
    content: ''; display: inline-block; width: 6px; height: 6px;
    background: #4ade80; border-radius: 50%; margin-right: 5px;
  }
  #logout-btn, .back-btn {
    border: none; background: none; color: var(--text-dim);
    font-size: 13px; font-family: inherit; padding: 6px;
  }
  .back-btn { color: var(--accent); font-size: 15px; font-weight: 600; padding-right: 4px; }

  /* --- Chat list screen --- */
  #list-screen { display: flex; flex-direction: column; height: 100%; }
  #user-list { flex: 1; overflow-y: auto; padding: 6px 0; }
  .user-row {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 18px; border-bottom: 1px solid #1c212a;
  }
  .user-row .name { font-size: 15.5px; font-weight: 600; }
  .user-row .sub { font-size: 12.5px; color: var(--text-dim); }
  .list-empty { margin: auto; text-align: center; color: var(--text-dim); font-size: 14px; padding: 30px; line-height: 1.5; }

  /* --- Chat screen --- */
  #chat-screen { display: flex; flex-direction: column; height: 100%; }
  #messages {
    flex: 1; overflow-y: auto; padding: 18px 14px;
    display: flex; flex-direction: column; gap: 8px;
    -webkit-overflow-scrolling: touch;
  }
  .bubble-row { display: flex; }
  .bubble-row.me { justify-content: flex-end; }
  .bubble-row.them { justify-content: flex-start; }
  .bubble {
    max-width: 78%; padding: 10px 14px; border-radius: var(--radius);
    font-size: 15px; line-height: 1.35; word-wrap: break-word;
  }
  .bubble.me { background: var(--bubble-me); color: #1a1200; border-bottom-right-radius: 6px; }
  .bubble.them { background: var(--bubble-them); color: var(--text); border-bottom-left-radius: 6px; }
  .bubble .time { display: block; font-size: 10.5px; opacity: 0.6; margin-top: 3px; text-align: right; }
  .empty-state { margin: auto; text-align: center; color: var(--text-dim); font-size: 14px; padding: 20px; line-height: 1.5; }

  #input-bar {
    display: flex; align-items: flex-end; gap: 10px;
    padding: 10px 14px calc(env(safe-area-inset-bottom) + 10px);
    background: var(--panel); border-top: 1px solid #23282f; flex-shrink: 0;
  }
  #text-input {
    flex: 1; min-height: 40px; max-height: 120px;
    padding: 10px 14px; border-radius: 20px; border: none;
    background: #262c36; color: var(--text); font-size: 15px;
    font-family: inherit; resize: none; outline: none;
  }
  #send-btn {
    width: 40px; height: 40px; border-radius: 50%; border: none;
    background: var(--accent); color: #1a1200; font-size: 18px; font-weight: 700;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  #send-btn:disabled { opacity: 0.35; }
  #conn-status { font-size: 11.5px; text-align: center; padding: 6px; color: var(--text-dim); flex-shrink: 0; }
  #conn-status.error { color: var(--danger); }
</style>
</head>
<body>

<div id="app-root">

  <!-- AUTH -->
  <div id="auth-screen">
    <h1 id="auth-title">Вход</h1>
    <p class="sub" id="auth-sub">Войдите, чтобы попасть в чат.</p>
    <input id="email-input" class="field" type="email" placeholder="Email" autocapitalize="off" autocorrect="off">
    <input id="password-input" class="field" type="password" placeholder="Пароль (минимум 6 символов)">
    <div id="auth-error"></div>
    <div id="auth-loading" class="hidden">Подождите…</div>
    <button id="auth-submit" class="btn">Войти</button>
    <button id="auth-toggle" class="btn secondary">Нет аккаунта? Зарегистрироваться</button>
  </div>

  <!-- CHAT LIST -->
  <div id="list-screen" class="hidden">
    <header>
      <div class="avatar" id="my-avatar">Я</div>
      <div class="header-info">
        <div class="name">Чаты</div>
        <div class="status online" id="list-status">подключение...</div>
      </div>
      <button id="logout-btn">Выйти</button>
    </header>
    <div id="user-list">
      <div class="list-empty">Загружаю список людей…</div>
    </div>
  </div>

  <!-- CHAT -->
  <div id="chat-screen" class="hidden">
    <header>
      <button class="back-btn" id="back-btn">‹</button>
      <div class="avatar" id="peer-avatar">?</div>
      <div class="header-info">
        <div class="name" id="peer-name">—</div>
        <div class="status online">личный чат</div>
      </div>
    </header>
    <div id="messages"><div class="empty-state">Загружаю сообщения…</div></div>
    <div id="conn-status"></div>
    <div id="input-bar">
      <textarea id="text-input" rows="1" placeholder="Сообщение"></textarea>
      <button id="send-btn" disabled>↑</button>
    </div>
  </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
    onAuthStateChanged, signOut
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import {
    getFirestore, collection, addDoc, doc, setDoc, query, orderBy, limit,
    onSnapshot, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBsm7o0SwTZCCk3VQc_ZOT_WQokI9EaLpc",
    authDomain: "messenger-c8483.firebaseapp.com",
    projectId: "messenger-c8483",
    storageBucket: "messenger-c8483.firebasestorage.app",
    messagingSenderId: "278474093521",
    appId: "1:278474093521:web:356302e628d7c95fbbe6f0"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const usersRef = collection(db, "users");

  let currentUser = null;
  let unsubUserList = null;
  let unsubMessages = null;

  // ---------- Elements ----------
  const authScreen = document.getElementById('auth-screen');
  const listScreen = document.getElementById('list-screen');
  const chatScreen = document.getElementById('chat-screen');

  const authTitle = document.getElementById('auth-title');
  const authSub = document.getElementById('auth-sub');
  const emailInput = document.getElementById('email-input');
  const passwordInput = document.getElementById('password-input');
  const authError = document.getElementById('auth-error');
  const authLoading = document.getElementById('auth-loading');
  const authSubmit = document.getElementById('auth-submit');
  const authToggle = document.getElementById('auth-toggle');
  const logoutBtn = document.getElementById('logout-btn');
  const myAvatar = document.getElementById('my-avatar');
  const listStatus = document.getElementById('list-status');
  const userListEl = document.getElementById('user-list');

  const backBtn = document.getElementById('back-btn');
  const peerAvatar = document.getElementById('peer-avatar');
  const peerName = document.getElementById('peer-name');
  const messagesEl = document.getElementById('messages');
  const textInput = document.getElementById('text-input');
  const sendBtn = document.getElementById('send-btn');
  const connStatus = document.getElementById('conn-status');

  let mode = 'login';

  function setMode(m) {
    mode = m;
    authError.textContent = '';
    if (m === 'login') {
      authTitle.textContent = 'Вход';
      authSub.textContent = 'Войдите, чтобы попасть в чат.';
      authSubmit.textContent = 'Войти';
      authToggle.textContent = 'Нет аккаунта? Зарегистрироваться';
    } else {
      authTitle.textContent = 'Регистрация';
      authSub.textContent = 'Придумайте email и пароль — это будет ваш аккаунт.';
      authSubmit.textContent = 'Зарегистрироваться';
      authToggle.textContent = 'Уже есть аккаунт? Войти';
    }
  }
  authToggle.addEventListener('click', () => setMode(mode === 'login' ? 'signup' : 'login'));

  function friendlyError(code) {
    const map = {
      'auth/invalid-email': 'Некорректный email',
      'auth/missing-password': 'Введите пароль',
      'auth/weak-password': 'Пароль слишком короткий (минимум 6 символов)',
      'auth/email-already-in-use': 'Этот email уже зарегистрирован — попробуйте войти',
      'auth/invalid-credential': 'Неверный email или пароль',
      'auth/user-not-found': 'Такого аккаунта нет — попробуйте зарегистрироваться',
      'auth/wrong-password': 'Неверный пароль',
      'auth/too-many-requests': 'Слишком много попыток, подождите немного'
    };
    return map[code] || 'Что-то пошло не так, попробуйте ещё раз';
  }

  authSubmit.addEventListener('click', async () => {
    const email = emailInput.value.trim();
    const password = passwordInput.value;
    authError.textContent = '';
    if (!email || !password) { authError.textContent = 'Заполните email и пароль'; return; }
    authSubmit.disabled = true;
    authLoading.classList.remove('hidden');
    try {
      let cred;
      if (mode === 'signup') {
        cred = await createUserWithEmailAndPassword(auth, email, password);
        // Регистрируем пользователя в общем списке, чтобы другие могли его найти
        await setDoc(doc(db, "users", cred.user.uid), {
          email: cred.user.email,
          name: cred.user.email.split('@')[0],
          createdAt: serverTimestamp()
        });
      } else {
        await signInWithEmailAndPassword(auth, email, password);
      }
    } catch (e) {
      authError.textContent = friendlyError(e.code);
    } finally {
      authSubmit.disabled = false;
      authLoading.classList.add('hidden');
    }
  });

  logoutBtn.addEventListener('click', () => signOut(auth));

  // ---------- Auth state ----------
  onAuthStateChanged(auth, (user) => {
    currentUser = user;
    if (unsubUserList) { unsubUserList(); unsubUserList = null; }
    if (unsubMessages) { unsubMessages(); unsubMessages = null; }

    if (user) {
      authScreen.classList.add('hidden');
      chatScreen.classList.add('hidden');
      listScreen.classList.remove('hidden');
      myAvatar.textContent = user.email.slice(0,1);
      showUserList(user);
    } else {
      listScreen.classList.add('hidden');
      chatScreen.classList.add('hidden');
      authScreen.classList.remove('hidden');
      emailInput.value = '';
      passwordInput.value = '';
    }
  });

  // ---------- Chat list ----------
  function showUserList(user) {
    const q = query(usersRef, orderBy("createdAt", "desc"), limit(100));
    unsubUserList = onSnapshot(q, (snapshot) => {
      listStatus.textContent = 'в сети';
      const others = snapshot.docs.filter(d => d.id !== user.uid);
      if (others.length === 0) {
        userListEl.innerHTML = '<div class="list-empty">Пока нет других зарегистрированных людей. Отправьте ссылку другу и попросите его зарегистрироваться — он появится здесь.</div>';
        return;
      }
      userListEl.innerHTML = others.map(d => {
        const u = d.data();
        const initial = (u.name || '?').slice(0,1);
        return `<div class="user-row" data-uid="${d.id}" data-name="${escapeHtml(u.name || u.email)}">
          <div class="avatar">${escapeHtml(initial)}</div>
          <div>
            <div class="name">${escapeHtml(u.name || u.email)}</div>
            <div class="sub">${escapeHtml(u.email)}</div>
          </div>
        </div>`;
      }).join('');
      userListEl.querySelectorAll('.user-row').forEach(row => {
        row.addEventListener('click', () => openChat(row.dataset.uid, row.dataset.name));
      });
    }, (error) => {
      listStatus.textContent = 'ошибка соединения';
    });
  }

  // ---------- Private chat ----------
  function chatIdFor(uidA, uidB) {
    return [uidA, uidB].sort().join('_');
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function formatTime(ts) {
    if (!ts) return '';
    const d = ts.toDate ? ts.toDate() : new Date();
    return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
  }

  function openChat(otherUid, otherName) {
    listScreen.classList.add('hidden');
    chatScreen.classList.remove('hidden');
    peerName.textContent = otherName;
    peerAvatar.textContent = otherName.slice(0,1);

    const chatId = chatIdFor(currentUser.uid, otherUid);
    const messagesRef = collection(db, "chats", chatId, "messages");
    const q = query(messagesRef, orderBy("createdAt", "asc"), limit(200));

    if (unsubMessages) unsubMessages();
    unsubMessages = onSnapshot(q, (snapshot) => {
      connStatus.textContent = '';
      connStatus.classList.remove('error');
      if (snapshot.empty) {
        messagesEl.innerHTML = '<div class="empty-state">Пока пусто. Напишите первое сообщение.</div>';
        return;
      }
      messagesEl.innerHTML = snapshot.docs.map(docu => {
        const m = docu.data();
        const mine = m.senderUid === currentUser.uid;
        const side = mine ? 'me' : 'them';
        return `<div class="bubble-row ${side}">
          <div class="bubble ${side}">${escapeHtml(m.text)}<span class="time">${formatTime(m.createdAt)}</span></div>
        </div>`;
      }).join('');
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }, (error) => {
      connStatus.textContent = 'Нет связи: ' + error.message;
      connStatus.classList.add('error');
    });

    async function sendMessage() {
      const text = textInput.value.trim();
      if (!text) return;
      sendBtn.disabled = true;
      textInput.value = '';
      textInput.style.height = 'auto';
      try {
        await addDoc(messagesRef, {
          senderUid: currentUser.uid,
          text: text,
          createdAt: serverTimestamp()
        });
      } catch (e) {
        connStatus.textContent = 'Не отправилось: ' + e.message;
        connStatus.classList.add('error');
      }
    }

    textInput.oninput = () => {
      sendBtn.disabled = textInput.value.trim().length === 0;
      textInput.style.height = 'auto';
      textInput.style.height = Math.min(textInput.scrollHeight, 120) + 'px';
    };
    textInput.onkeydown = (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    };
    sendBtn.onclick = sendMessage;
    textInput.value = '';
    sendBtn.disabled = true;
  }

  backBtn.addEventListener('click', () => {
    if (unsubMessages) { unsubMessages(); unsubMessages = null; }
    chatScreen.classList.add('hidden');
    listScreen.classList.remove('hidden');
  });

  setMode('login');
</script>
</body>
</html>
