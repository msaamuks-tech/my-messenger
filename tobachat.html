<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>TobaChat</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TobaChat">
<meta name="theme-color" content="#17212b">
<link rel="apple-touch-icon" href="logo-180.png">
<link rel="icon" href="logo-512.png">
<style>
  :root {
    --bg: #0e1621;
    --panel: #17212b;
    --panel-2: #1e2c3a;
    --accent: #4fa9e8;
    --accent-dim: #3a83b8;
    --text: #e5e9ed;
    --text-dim: #7d8b99;
    --bubble-me: #2b5278;
    --bubble-them: #1e2c3a;
    --radius: 16px;
    --danger: #ff6b6b;
    --verified: #4fa9e8;
    --border: #0a121c;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    overscroll-behavior: none;
  }

  /* Liquid glass ambient background */
  #blobs { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
  #blobs span { position: absolute; border-radius: 50%; filter: blur(70px); opacity: 0.32; }
  #blobs span:nth-child(1) { width: 280px; height: 280px; background: #4fa9e8; top: -70px; left: -60px; animation: float1 18s ease-in-out infinite; }
  #blobs span:nth-child(2) { width: 240px; height: 240px; background: #2b5278; bottom: 8%; right: -70px; animation: float2 22s ease-in-out infinite; }
  #blobs span:nth-child(3) { width: 200px; height: 200px; background: #7ecbff; bottom: -60px; left: 15%; animation: float3 26s ease-in-out infinite; }
  #blobs span:nth-child(4) { width: 160px; height: 160px; background: #8a6fff; top: 30%; right: 10%; animation: float2 30s ease-in-out infinite reverse; opacity: 0.2; }
  #blobs span:nth-child(5) { width: 140px; height: 140px; background: #4fa9e8; top: 55%; left: -40px; animation: float3 20s ease-in-out infinite reverse; opacity: 0.22; }
  #particles { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
  #particles span {
    position: absolute; width: 3px; height: 3px; border-radius: 50%;
    background: rgba(126,203,255,0.7); animation: twinkle 3.5s ease-in-out infinite;
  }
  @keyframes twinkle { 0%, 100% { opacity: 0; transform: scale(0.6); } 50% { opacity: 1; transform: scale(1.3); } }
  @keyframes float1 { 0%,100% { transform: translate(0,0) scale(1); } 33% { transform: translate(45px, 55px) scale(1.06); } 66% { transform: translate(-20px, 30px) scale(0.97); } }
  @keyframes float2 { 0%,100% { transform: translate(0,0) scale(1); } 33% { transform: translate(-50px, -35px) scale(1.08); } 66% { transform: translate(25px, -15px) scale(0.96); } }
  @keyframes float3 { 0%,100% { transform: translate(0,0) scale(1); } 33% { transform: translate(35px, -50px) scale(1.04); } 66% { transform: translate(-25px, -20px) scale(1.02); } }

  .glass {
    background: rgba(23,33,43,0.55);
    -webkit-backdrop-filter: blur(22px) saturate(160%);
    backdrop-filter: blur(22px) saturate(160%);
    border: 1px solid rgba(255,255,255,0.08);
  }

  @keyframes screenIn { from { opacity: 0; transform: translateY(18px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
  .screen-enter { animation: screenIn 0.42s cubic-bezier(.16,1,.3,1) both; }

  /* --- Splash screen --- */
  #splash-screen {
    position: fixed; inset: 0; z-index: 50;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 18px; background: var(--bg);
  }
  #splash-logo {
    width: 96px; height: 96px; border-radius: 26px;
    animation: splashPulse 1.8s ease-in-out infinite;
    box-shadow: 0 0 40px rgba(79,169,232,0.5);
  }
  @keyframes splashPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.06); }
  }
  #splash-name { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
  #splash-dots { display: flex; gap: 6px; }
  #splash-dots span {
    width: 7px; height: 7px; border-radius: 50%; background: var(--accent);
    animation: splashBounce 1.2s infinite ease-in-out;
  }
  #splash-dots span:nth-child(2) { animation-delay: 0.15s; }
  #splash-dots span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes splashBounce { 0%, 60%, 100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-5px); opacity: 1; } }
  #splash-screen.fade-out { animation: splashFadeOut 0.4s ease forwards; }
  @keyframes splashFadeOut { to { opacity: 0; visibility: hidden; } }
  #app-root {
    position: relative; z-index: 1;
    display: flex; flex-direction: column;
    height: 100vh; height: 100dvh;
    max-width: 480px; margin: 0 auto;
    background: transparent;
  }
  .hidden { display: none !important; }

  /* --- Auth --- */
  #auth-screen {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 14px; padding: 24px; height: 100%;
  }
  #auth-card {
    display: flex; flex-direction: column; align-items: center; gap: 14px;
    padding: 30px 24px; border-radius: 22px; width: 100%; max-width: 320px;
    background: rgba(23,33,43,0.55);
    -webkit-backdrop-filter: blur(24px) saturate(160%);
    backdrop-filter: blur(24px) saturate(160%);
    border: 1px solid rgba(255,255,255,0.08);
  }
  #auth-screen h1 { font-size: 22px; margin: 0 0 2px; letter-spacing: -0.3px; }
  #auth-screen p.sub { color: var(--text-dim); font-size: 13.5px; text-align: center; margin: 0 0 8px; }
  .field {
    width: 100%; padding: 13px 16px; border-radius: 10px; border: 1px solid var(--border);
    background: var(--bg); color: var(--text); font-size: 16px; font-family: inherit;
    transition: border-color 0.2s;
  }
  .field:focus { outline: none; border-color: var(--accent); }
  .btn {
    width: 100%; padding: 13px; border-radius: 10px; border: none;
    background: var(--accent); color: #fff; font-size: 15px; font-weight: 600; font-family: inherit;
    transition: opacity 0.15s;
  }
  .btn:active { opacity: 0.8; }
  .btn:disabled { opacity: 0.4; }
  .btn.secondary { background: transparent; color: var(--accent); font-weight: 600; padding: 6px; }
  #auth-error { color: var(--danger); font-size: 13px; text-align: center; min-height: 16px; }
  #auth-loading { color: var(--text-dim); font-size: 13px; }

  /* --- Shared header --- */
  header {
    padding: calc(env(safe-area-inset-top) + 10px) 16px 10px;
    display: flex; align-items: center; gap: 12px;
    flex-shrink: 0; z-index: 2;
    background: rgba(23,33,43,0.55);
    -webkit-backdrop-filter: blur(24px) saturate(160%);
    backdrop-filter: blur(24px) saturate(160%);
    border-bottom: 1px solid rgba(255,255,255,0.07);
  }
  .avatar {
    width: 42px; height: 42px; border-radius: 50%;
    background: linear-gradient(135deg, #4fa9e8, #2b5278);
    display: flex; align-items: center; justify-content: center;
    font-weight: 600; font-size: 16px; color: #fff; flex-shrink: 0;
    text-transform: uppercase;
  }
  .avatar.sm { width: 20px; height: 20px; font-size: 10px; }
  .header-info { flex: 1; min-width: 0; }
  .header-info .name-row { display: flex; align-items: center; gap: 4px; }
  .header-info .name { font-size: 17px; font-weight: 600; }
  .header-info .status { font-size: 13px; color: var(--text-dim); transition: color 0.2s; }
  .status.online { color: var(--accent); }
  .status.typing { color: var(--accent); }
  .badge-verified {
    width: 16px; height: 16px; border-radius: 50%;
    background: #34aadc;
    display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0;
    animation: badgePop 0.4s cubic-bezier(.25,1.4,.4,1) both;
  }
  @keyframes badgePop {
    0% { transform: scale(0); opacity: 0; }
    60% { transform: scale(1.18); opacity: 1; }
    100% { transform: scale(1); }
  }
  .badge-verified svg { width: 10px; height: 10px; }
  #logout-btn, .back-btn {
    border: none; background: none; color: var(--text-dim);
    font-size: 13px; font-family: inherit; padding: 6px;
  }
  .back-btn { color: var(--accent); font-size: 26px; font-weight: 400; padding-right: 2px; line-height: 1; }

  #icon-btn-row { display: flex; align-items: center; gap: 4px; }
  .icon-btn {
    border: none; background: none; color: var(--accent);
    padding: 6px; display: flex; align-items: center; justify-content: center;
  }
  .icon-btn svg { width: 22px; height: 22px; }

  /* --- Chats list --- */
  #chats-screen { display: flex; flex-direction: column; height: 100%; }
  #chats-list { flex: 1; overflow-y: auto; }
  .chat-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 16px; border-bottom: 1px solid rgba(255,255,255,0.06);
    animation: rowIn 0.42s cubic-bezier(.16,1,.3,1) both;
  }
  @keyframes rowIn { from { opacity: 0; transform: translateX(-14px) scale(0.98); } to { opacity: 1; transform: translateX(0) scale(1); } }
  .chat-row:nth-child(1) { animation-delay: 0.02s; }
  .chat-row:nth-child(2) { animation-delay: 0.06s; }
  .chat-row:nth-child(3) { animation-delay: 0.10s; }
  .chat-row:nth-child(4) { animation-delay: 0.14s; }
  .chat-row:nth-child(5) { animation-delay: 0.18s; }
  .chat-row:nth-child(n+6) { animation-delay: 0.2s; }
  .chat-row { transition: background 0.15s ease; }
  .chat-row:active { transform: scale(0.985); }
  .chat-row:active { background: rgba(255,255,255,0.04); }
  .chat-row .body { flex: 1; min-width: 0; }
  .chat-row .top-line { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; }
  .chat-row .name-row { display: flex; align-items: center; gap: 4px; min-width: 0; }
  .chat-row .name { font-size: 16px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .chat-row .time { font-size: 12.5px; color: var(--text-dim); flex-shrink: 0; }
  .chat-row .preview-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-top: 2px; }
  .chat-row .preview { font-size: 14px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .unread-dot {
    min-width: 20px; height: 20px; border-radius: 10px; background: var(--accent);
    color: #fff; font-size: 11.5px; font-weight: 700; display: flex; align-items: center;
    justify-content: center; padding: 0 6px; flex-shrink: 0;
  }
  .list-empty { margin: auto; text-align: center; color: var(--text-dim); font-size: 14px; padding: 40px 30px; line-height: 1.6; }

  .fab {
    position: absolute; right: 18px; bottom: calc(env(safe-area-inset-bottom) + 22px);
    width: 54px; height: 54px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.15);
    background: rgba(79,169,232,0.85);
    -webkit-backdrop-filter: blur(18px); backdrop-filter: blur(18px);
    color: #fff; box-shadow: 0 6px 22px rgba(79,169,232,0.45), 0 2px 8px rgba(0,0,0,0.35);
    display: flex; align-items: center; justify-content: center; z-index: 3;
    transition: transform 0.15s;
  }
  .fab svg { width: 24px; height: 24px; }
  .fab:active { transform: scale(0.9); opacity: 0.9; }

  /* --- New chat (people) screen --- */
  #newchat-screen { display: flex; flex-direction: column; height: 100%; }
  #people-list { flex: 1; overflow-y: auto; }
  .user-row {
    display: flex; align-items: center; gap: 12px;
    padding: 11px 16px; border-bottom: 1px solid var(--border);
  }
  .user-row:active { background: rgba(255,255,255,0.04); }
  .user-row .name-row { display: flex; align-items: center; gap: 5px; }
  .user-row .name { font-size: 15.5px; font-weight: 600; }
  .user-row .sub { font-size: 12.5px; color: var(--text-dim); }

  /* --- Settings --- */
  #settings-screen { display: flex; flex-direction: column; height: 100%; }
  #settings-tabs {
    position: relative; display: flex; margin: 14px 16px 4px;
    background: rgba(255,255,255,0.05); border-radius: 12px; padding: 3px;
  }
  .tab-btn {
    flex: 1; z-index: 1; border: none; background: none; color: var(--text-dim);
    font-size: 14px; font-weight: 600; font-family: inherit; padding: 9px 0;
    transition: color 0.25s ease;
  }
  .tab-btn.active { color: #fff; }
  #tab-indicator {
    position: absolute; top: 3px; bottom: 3px; left: 3px;
    width: calc(50% - 3px); border-radius: 9px;
    background: var(--accent); z-index: 0;
    transition: transform 0.32s cubic-bezier(.22,.9,.32,1.15);
  }
  .tab-panel { transition: opacity 0.25s ease, transform 0.25s ease; }
  #settings-body { flex: 1; overflow-y: auto; padding: 16px 16px 30px; display: flex; flex-direction: column; gap: 16px; }
  .settings-section { padding: 16px; border-radius: 18px; display: flex; flex-direction: column; gap: 10px;
    background: rgba(23,33,43,0.55);
    -webkit-backdrop-filter: blur(24px) saturate(160%);
    backdrop-filter: blur(24px) saturate(160%);
    border: 1px solid rgba(255,255,255,0.08);
  }
  .settings-section h3 { margin: 0; font-size: 12.5px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-dim); font-weight: 600; }
  .settings-email { font-size: 13px; color: var(--text-dim); word-break: break-all; }
  .status-pill {
    display: inline-flex; align-items: center; gap: 5px; padding: 8px 12px;
    border-radius: 10px; font-size: 13.5px; background: rgba(255,255,255,0.05);
  }
  .status-pill.verified { color: var(--verified); }
  .status-pill.pending { color: var(--accent); }
  .small-btn { padding: 8px 14px; border-radius: 8px; border: none; font-size: 13px; font-weight: 600; font-family: inherit; }
  .small-btn.approve { background: #4ade80; color: #0a2210; }
  .small-btn.reject { background: rgba(255,255,255,0.08); color: var(--text-dim); }
  .admin-user-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .admin-user-row:last-child { border-bottom: none; }
  .admin-user-row .who { font-size: 14px; }
  .admin-user-row .who .sub { display: block; font-size: 11.5px; color: var(--text-dim); }
  .empty-note { font-size: 13px; color: var(--text-dim); }
  #save-name-status { font-size: 12px; color: #4ade80; min-height: 14px; }

  /* --- Chat screen --- */
  #chat-screen { display: flex; flex-direction: column; height: 100%; }
  #messages {
    flex: 1; overflow-y: auto; padding: 14px 12px;
    display: flex; flex-direction: column; gap: 6px;
    -webkit-overflow-scrolling: touch;
    position: relative;
    background-image:
      radial-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      radial-gradient(circle at 15% 20%, rgba(79,169,232,0.16), transparent 40%),
      radial-gradient(circle at 85% 15%, rgba(126,203,255,0.14), transparent 42%),
      radial-gradient(circle at 25% 85%, rgba(43,82,120,0.28), transparent 45%),
      radial-gradient(circle at 90% 80%, rgba(138,111,255,0.12), transparent 45%);
    background-size: 16px 16px, 180% 180%, 180% 180%, 180% 180%, 180% 180%;
    background-position: 0 0, 0% 0%, 100% 0%, 0% 100%, 100% 100%;
    animation: livingBg 24s ease-in-out infinite;
  }
  @keyframes livingBg {
    0%   { background-position: 0 0, 0% 0%, 100% 0%, 0% 100%, 100% 100%; }
    25%  { background-position: 0 0, 15% 10%, 85% 15%, 10% 85%, 90% 90%; }
    50%  { background-position: 0 0, 5% 20%, 95% 5%, 20% 95%, 80% 80%; }
    75%  { background-position: 0 0, 20% 5%, 80% 20%, 5% 80%, 95% 95%; }
    100% { background-position: 0 0, 0% 0%, 100% 0%, 0% 100%, 100% 100%; }
  }
  #messages.pulse::before {
    content: ''; position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(circle at 50% 100%, rgba(79,169,232,0.22), transparent 60%);
    animation: bgPulse 0.7s ease-out forwards;
  }
  @keyframes bgPulse { from { opacity: 1; } to { opacity: 0; } }
  .bubble-row { display: flex; animation: bubbleIn 0.38s cubic-bezier(.2,1.2,.3,1) both; }
  @keyframes bubbleIn { from { opacity: 0; transform: translateY(14px) scale(0.9); } to { opacity: 1; transform: translateY(0) scale(1); } }
  .bubble-row.me { justify-content: flex-end; }
  .bubble-row.them { justify-content: flex-start; }
  .bubble {
    max-width: 78%; padding: 8px 12px; border-radius: var(--radius);
    font-size: 15.5px; line-height: 1.35; word-wrap: break-word;
  }
  .bubble.me { background: var(--bubble-me); color: #fff; border-bottom-right-radius: 4px; }
  .bubble.them { background: var(--bubble-them); color: var(--text); border-bottom-left-radius: 4px; }
  .meta-row { display: flex; align-items: center; gap: 3px; margin-top: 2px; justify-content: flex-end; padding: 0 2px; }
  .bubble .time { font-size: 10.5px; opacity: 0.6; }
  .ticks { display: inline-flex; color: rgba(255,255,255,0.55); }
  .ticks.read { color: #7ecbff; }
  .ticks svg { width: 14px; height: 14px; }
  .empty-state { margin: auto; text-align: center; color: var(--text-dim); font-size: 14px; padding: 20px; line-height: 1.5; }

  #input-bar {
    display: flex; align-items: flex-end; gap: 8px;
    padding: 8px 10px calc(env(safe-area-inset-bottom) + 8px);
    flex-shrink: 0; background: rgba(23,33,43,0.55);
    -webkit-backdrop-filter: blur(24px) saturate(160%);
    backdrop-filter: blur(24px) saturate(160%);
    border-top: 1px solid rgba(255,255,255,0.07);
  }
  #text-input {
    flex: 1; min-height: 40px; max-height: 120px;
    padding: 10px 14px; border-radius: 20px; border: 1px solid var(--border);
    background: var(--bg); color: var(--text); font-size: 15px;
    font-family: inherit; resize: none; outline: none;
  }
  #text-input:focus { border-color: var(--accent); }
  #send-btn {
    width: 40px; height: 40px; border-radius: 50%; border: none;
    background: var(--accent); color: #fff; font-size: 18px; font-weight: 700;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    transition: transform 0.15s;
  }
  #send-btn.sending { animation: sendPulse 0.3s ease; }
  @keyframes sendPulse { 0% { transform: scale(1); } 40% { transform: scale(0.8); } 100% { transform: scale(1); } }
  #send-btn:disabled { opacity: 0.35; }
  #conn-status { font-size: 11.5px; text-align: center; padding: 6px; color: var(--text-dim); flex-shrink: 0; }
  #conn-status.error { color: var(--danger); }

  .screen-relative { position: relative; }
</style>
</head>
<body>

<div id="splash-screen">
  <img id="splash-logo" src="logo-180.png" alt="TobaChat">
  <div id="splash-name">TobaChat</div>
  <div id="splash-dots"><span></span><span></span><span></span></div>
</div>

<div id="blobs"><span></span><span></span><span></span><span></span><span></span></div>
<div id="particles">
  <span style="top:12%; left:20%; animation-delay:0s;"></span>
  <span style="top:22%; left:75%; animation-delay:0.5s;"></span>
  <span style="top:40%; left:10%; animation-delay:1s;"></span>
  <span style="top:60%; left:85%; animation-delay:1.5s;"></span>
  <span style="top:75%; left:35%; animation-delay:2s;"></span>
  <span style="top:85%; left:60%; animation-delay:2.5s;"></span>
  <span style="top:30%; left:50%; animation-delay:1.2s;"></span>
</div>

<div id="app-root">

  <!-- AUTH -->
  <div id="auth-screen">
    <div id="auth-card">
      <h1 id="auth-title">Вход</h1>
      <p class="sub" id="auth-sub">Войдите, чтобы попасть в чат.</p>
      <input id="email-input" class="field" type="email" placeholder="Email" autocapitalize="off" autocorrect="off">
      <input id="password-input" class="field" type="password" placeholder="Пароль (минимум 6 символов)">
      <div id="auth-error"></div>
      <div id="auth-loading" class="hidden">Подождите…</div>
      <button id="auth-submit" class="btn">Войти</button>
      <button id="auth-toggle" class="btn secondary">Нет аккаунта? Зарегистрироваться</button>
    </div>
  </div>

  <!-- CHATS LIST -->
  <div id="chats-screen" class="hidden screen-relative">
    <header>
      <div class="avatar" id="my-avatar">Я</div>
      <div class="header-info">
        <div class="name">Чаты</div>
        <div class="status online" id="list-status">подключение...</div>
      </div>
      <div id="icon-btn-row">
        <button class="icon-btn" id="settings-btn" title="Настройки">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 11-4 0v-.09a1.65 1.65 0 00-1-1.51 1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 110-4h.09a1.65 1.65 0 001.51-1 1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 114 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 110 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        </button>
        <button id="logout-btn">Выйти</button>
      </div>
    </header>
    <div id="chats-list"><div class="list-empty">Загружаю чаты…</div></div>
    <button class="fab" id="fab-new-chat" title="Новый чат">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
    </button>
  </div>

  <!-- NEW CHAT (people list) -->
  <div id="newchat-screen" class="hidden">
    <header>
      <button class="back-btn" id="newchat-back-btn">‹</button>
      <div class="header-info"><div class="name">Новый чат</div></div>
    </header>
    <div id="people-list"><div class="list-empty">Загружаю список людей…</div></div>
  </div>

  <!-- SETTINGS -->
  <div id="settings-screen" class="hidden">
    <header>
      <button class="back-btn" id="settings-back-btn">‹</button>
      <div class="header-info"><div class="name">Настройки</div></div>
    </header>
    <div id="settings-tabs">
      <button class="tab-btn active" id="tab-btn-profile" data-tab="profile">Профиль</button>
      <button class="tab-btn" id="tab-btn-verify" data-tab="verify">Верификация</button>
      <div id="tab-indicator"></div>
    </div>
    <div id="settings-body">
      <div class="settings-section tab-panel" data-panel="profile">
        <div class="settings-email" id="settings-email">—</div>
        <input id="settings-name-input" class="field" type="text" placeholder="Ваше имя" maxlength="20">
        <button id="settings-save-name" class="btn">Сохранить имя</button>
        <div id="save-name-status"></div>
      </div>
      <div class="settings-section tab-panel hidden" id="verification-section" data-panel="verify">
        <div id="verification-content">Загрузка…</div>
      </div>
    </div>
  </div>

  <!-- CHAT -->
  <div id="chat-screen" class="hidden">
    <header>
      <button class="back-btn" id="back-btn">‹</button>
      <div class="avatar" id="peer-avatar">?</div>
      <div class="header-info">
        <div class="name-row"><span class="name" id="peer-name">—</span><span class="badge-verified hidden" id="peer-badge"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.5l4.5 4.5L19 7"/></svg></span></div>
        <div class="status" id="chat-status">в сети</div>
      </div>
    </header>
    <div id="messages"><div class="empty-state">Загружаю сообщения…</div></div>
    <div id="conn-status"></div>
    <div id="input-bar">
      <textarea id="text-input" rows="1" placeholder="Сообщение"></textarea>
      <button id="send-btn" disabled>↑</button>
    </div>
  </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
    onAuthStateChanged, signOut
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import {
    getFirestore, collection, addDoc, doc, setDoc, getDoc, query, orderBy, limit, where,
    onSnapshot, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const ADMIN_EMAIL = "muka993@gmail.com";

  const firebaseConfig = {
    apiKey: "AIzaSyBsm7o0SwTZCCk3VQc_ZOT_WQokI9EaLpc",
    authDomain: "messenger-c8483.firebaseapp.com",
    projectId: "messenger-c8483",
    storageBucket: "messenger-c8483.firebasestorage.app",
    messagingSenderId: "278474093521",
    appId: "1:278474093521:web:356302e628d7c95fbbe6f0"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const usersRef = collection(db, "users");
  const chatsRef = collection(db, "chats");

  let currentUser = null;
  let usersMap = {};          // uid -> {name, email, verified}
  let unsubUsersMap = null;
  let unsubChatsList = null;
  let unsubMessages = null;
  let unsubChatDoc = null;
  let unsubVerification = null;
  let typingTimeout = null;
  let currentChatId = null;
  let currentChatDocRef = null;
  let peerLastRead = null;

  // ---------- Elements ----------
  const authScreen = document.getElementById('auth-screen');
  const chatsScreen = document.getElementById('chats-screen');
  const newchatScreen = document.getElementById('newchat-screen');
  const chatScreen = document.getElementById('chat-screen');

  const authTitle = document.getElementById('auth-title');
  const authSub = document.getElementById('auth-sub');
  const emailInput = document.getElementById('email-input');
  const passwordInput = document.getElementById('password-input');
  const authError = document.getElementById('auth-error');
  const authLoading = document.getElementById('auth-loading');
  const authSubmit = document.getElementById('auth-submit');
  const authToggle = document.getElementById('auth-toggle');
  const logoutBtn = document.getElementById('logout-btn');
  const myAvatar = document.getElementById('my-avatar');
  const listStatus = document.getElementById('list-status');
  const chatsListEl = document.getElementById('chats-list');
  const fabNewChat = document.getElementById('fab-new-chat');
  const newchatBackBtn = document.getElementById('newchat-back-btn');
  const peopleListEl = document.getElementById('people-list');

  const settingsBtn = document.getElementById('settings-btn');
  const settingsScreen = document.getElementById('settings-screen');
  const settingsBackBtn = document.getElementById('settings-back-btn');
  const settingsEmail = document.getElementById('settings-email');
  const settingsNameInput = document.getElementById('settings-name-input');
  const settingsSaveName = document.getElementById('settings-save-name');
  const tabBtnProfile = document.getElementById('tab-btn-profile');
  const tabBtnVerify = document.getElementById('tab-btn-verify');
  const tabIndicator = document.getElementById('tab-indicator');
  const panelProfile = document.querySelector('.tab-panel[data-panel="profile"]');
  const panelVerify = document.querySelector('.tab-panel[data-panel="verify"]');

  function switchSettingsTab(tab) {
    const toVerify = tab === 'verify';
    tabIndicator.style.transform = toVerify ? 'translateX(100%)' : 'translateX(0)';
    tabBtnProfile.classList.toggle('active', !toVerify);
    tabBtnVerify.classList.toggle('active', toVerify);
    panelProfile.classList.toggle('hidden', toVerify);
    panelVerify.classList.toggle('hidden', !toVerify);
  }
  tabBtnProfile.addEventListener('click', () => switchSettingsTab('profile'));
  tabBtnVerify.addEventListener('click', () => switchSettingsTab('verify'));
  const saveNameStatus = document.getElementById('save-name-status');
  const verificationContent = document.getElementById('verification-content');

  const backBtn = document.getElementById('back-btn');
  const peerAvatar = document.getElementById('peer-avatar');
  const peerName = document.getElementById('peer-name');
  const peerBadge = document.getElementById('peer-badge');
  const chatStatus = document.getElementById('chat-status');
  const messagesEl = document.getElementById('messages');
  const textInput = document.getElementById('text-input');
  const sendBtn = document.getElementById('send-btn');
  const connStatus = document.getElementById('conn-status');

  let mode = 'login';

  function setMode(m) {
    mode = m;
    authError.textContent = '';
    if (m === 'login') {
      authTitle.textContent = 'Вход';
      authSub.textContent = 'Войдите, чтобы попасть в чат.';
      authSubmit.textContent = 'Войти';
      authToggle.textContent = 'Нет аккаунта? Зарегистрироваться';
    } else {
      authTitle.textContent = 'Регистрация';
      authSub.textContent = 'Придумайте email и пароль — это будет ваш аккаунт.';
      authSubmit.textContent = 'Зарегистрироваться';
      authToggle.textContent = 'Уже есть аккаунт? Войти';
    }
  }
  authToggle.addEventListener('click', () => setMode(mode === 'login' ? 'signup' : 'login'));

  function friendlyError(code) {
    const map = {
      'auth/invalid-email': 'Некорректный email',
      'auth/missing-password': 'Введите пароль',
      'auth/weak-password': 'Пароль слишком короткий (минимум 6 символов)',
      'auth/email-already-in-use': 'Этот email уже зарегистрирован — попробуйте войти',
      'auth/invalid-credential': 'Неверный email или пароль',
      'auth/user-not-found': 'Такого аккаунта нет — попробуйте зарегистрироваться',
      'auth/wrong-password': 'Неверный пароль',
      'auth/too-many-requests': 'Слишком много попыток, подождите немного'
    };
    return map[code] || 'Что-то пошло не так, попробуйте ещё раз';
  }

  authSubmit.addEventListener('click', async () => {
    const email = emailInput.value.trim();
    const password = passwordInput.value;
    authError.textContent = '';
    if (!email || !password) { authError.textContent = 'Заполните email и пароль'; return; }
    authSubmit.disabled = true;
    authLoading.classList.remove('hidden');
    try {
      let cred;
      if (mode === 'signup') {
        cred = await createUserWithEmailAndPassword(auth, email, password);
        await setDoc(doc(db, "users", cred.user.uid), {
          email: cred.user.email,
          name: cred.user.email.split('@')[0],
          verified: false,
          verificationRequested: false,
          createdAt: serverTimestamp()
        });
      } else {
        await signInWithEmailAndPassword(auth, email, password);
      }
    } catch (e) {
      authError.textContent = friendlyError(e.code);
    } finally {
      authSubmit.disabled = false;
      authLoading.classList.add('hidden');
    }
  });

  logoutBtn.addEventListener('click', () => signOut(auth));

  onAuthStateChanged(auth, (user) => {
    const splash = document.getElementById('splash-screen');
    if (splash && !splash.classList.contains('fade-out')) {
      setTimeout(() => splash.classList.add('fade-out'), 500);
    }
    currentUser = user;
    if (unsubUsersMap) { unsubUsersMap(); unsubUsersMap = null; }
    if (unsubChatsList) { unsubChatsList(); unsubChatsList = null; }
    if (unsubVerification) { unsubVerification(); unsubVerification = null; }
    settingsScreen.classList.add('hidden');
    newchatScreen.classList.add('hidden');
    cleanupChat();

    if (user) {
      authScreen.classList.add('hidden');
      chatScreen.classList.add('hidden');
      showScreen(chatsScreen);
      myAvatar.textContent = user.email.slice(0,1);
      startUsersMap(user);
      showChatsList(user);
    } else {
      chatsScreen.classList.add('hidden');
      chatScreen.classList.add('hidden');
      showScreen(authScreen);
      emailInput.value = '';
      passwordInput.value = '';
    }
  });

  // ---------- Users lookup map (name/verified/email for everyone) ----------
  function startUsersMap(user) {
    const q = query(usersRef, orderBy("createdAt", "desc"), limit(200));
    unsubUsersMap = onSnapshot(q, (snapshot) => {
      usersMap = {};
      snapshot.docs.forEach(d => { usersMap[d.id] = d.data(); });
      renderPeopleList(user, snapshot.docs);
    });
  }

  function renderPeopleList(user, docs) {
    const others = docs.filter(d => d.id !== user.uid);
    if (others.length === 0) {
      peopleListEl.innerHTML = '<div class="list-empty">Пока нет других зарегистрированных людей. Отправьте ссылку другу — он появится здесь.</div>';
      return;
    }
    peopleListEl.innerHTML = others.map(d => {
      const u = d.data();
      const initial = (u.name || '?').slice(0,1);
      const badge = u.verified ? '<span class="badge-verified"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.5l4.5 4.5L19 7"/></svg></span>' : '';
      return `<div class="user-row" data-uid="${d.id}" data-name="${escapeHtml(u.name || u.email)}" data-verified="${!!u.verified}">
        <div class="avatar">${escapeHtml(initial)}</div>
        <div>
          <div class="name-row"><span class="name">${escapeHtml(u.name || u.email)}</span>${badge}</div>
          <div class="sub">${escapeHtml(u.email)}</div>
        </div>
      </div>`;
    }).join('');
    peopleListEl.querySelectorAll('.user-row').forEach(row => {
      row.addEventListener('click', () => {
        newchatScreen.classList.add('hidden');
        openChat(row.dataset.uid, row.dataset.name, row.dataset.verified === 'true');
      });
    });
  }

  fabNewChat.addEventListener('click', () => {
    chatsScreen.classList.add('hidden');
    showScreen(newchatScreen);
  });
  newchatBackBtn.addEventListener('click', () => {
    newchatScreen.classList.add('hidden');
    showScreen(chatsScreen);
  });

  // ---------- Chats list with previews ----------
  function showChatsList(user) {
    const q = query(chatsRef, where("participants", "array-contains", user.uid));
    unsubChatsList = onSnapshot(q, (snapshot) => {
      listStatus.textContent = 'в сети';
      if (snapshot.empty) {
        chatsListEl.innerHTML = '<div class="list-empty">Пока нет ни одного чата. Нажмите на кнопку «+» внизу, чтобы начать переписку.</div>';
        return;
      }
      const rows = snapshot.docs.map(d => {
        const c = d.data();
        const otherUid = (c.participants || []).find(uid => uid !== user.uid);
        if (!otherUid) return null;
        const other = usersMap[otherUid] || {};
        const name = other.name || other.email || 'Пользователь';
        const initial = name.slice(0,1);
        const badge = other.verified ? '<span class="badge-verified"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.5l4.5 4.5L19 7"/></svg></span>' : '';
        const mine = c.lastSenderUid === user.uid;
        const previewText = c.lastMessage ? (mine ? 'Вы: ' : '') + c.lastMessage : 'Нет сообщений';
        const lastAtMs = c.lastMessageAt && c.lastMessageAt.toMillis ? c.lastMessageAt.toMillis() : 0;
        const myLastReadMs = (c.lastRead && c.lastRead[user.uid] && c.lastRead[user.uid].toMillis) ? c.lastRead[user.uid].toMillis() : 0;
        const unread = !mine && lastAtMs > myLastReadMs;
        return {
          html: `<div class="chat-row" data-uid="${otherUid}" data-name="${escapeHtml(name)}" data-verified="${!!other.verified}">
            <div class="avatar">${escapeHtml(initial)}</div>
            <div class="body">
              <div class="top-line">
                <div class="name-row"><span class="name">${escapeHtml(name)}</span>${badge}</div>
                <span class="time">${formatTime(c.lastMessageAt)}</span>
              </div>
              <div class="preview-row">
                <span class="preview">${escapeHtml(previewText)}</span>
                ${unread ? '<span class="unread-dot">•</span>' : ''}
              </div>
            </div>
          </div>`,
          sortKey: lastAtMs
        };
      }).filter(Boolean).sort((a,b) => b.sortKey - a.sortKey);

      if (rows.length === 0) {
        chatsListEl.innerHTML = '<div class="list-empty">Пока нет ни одного чата. Нажмите на кнопку «+» внизу, чтобы начать переписку.</div>';
        return;
      }
      chatsListEl.innerHTML = rows.map(r => r.html).join('');
      chatsListEl.querySelectorAll('.chat-row').forEach(row => {
        row.addEventListener('click', () => openChat(row.dataset.uid, row.dataset.name, row.dataset.verified === 'true'));
      });
    }, () => { listStatus.textContent = 'ошибка соединения'; });
  }

  // ---------- Settings ----------
  settingsBtn.addEventListener('click', openSettings);
  settingsBackBtn.addEventListener('click', closeSettings);

  async function openSettings() {
    chatsScreen.classList.add('hidden');
    showScreen(settingsScreen);
    switchSettingsTab('profile');
    saveNameStatus.textContent = '';
    settingsEmail.textContent = currentUser.email;

    const myDocRef = doc(db, "users", currentUser.uid);
    const mySnap = await getDoc(myDocRef);
    const myData = mySnap.exists() ? mySnap.data() : {};
    settingsNameInput.value = myData.name || currentUser.email.split('@')[0];

    const isAdmin = currentUser.email === ADMIN_EMAIL;

    if (isAdmin) {
      verificationContent.innerHTML = '<div class="empty-note">Загрузка заявок…</div>';
      const pendingQ = query(usersRef, where("verificationRequested", "==", true));
      unsubVerification = onSnapshot(pendingQ, (snap) => {
        renderAdminVerification(snap.docs);
      });
    } else {
      renderUserVerification(myData);
    }
  }

  function closeSettings() {
    if (unsubVerification) { unsubVerification(); unsubVerification = null; }
    settingsScreen.classList.add('hidden');
    showScreen(chatsScreen);
  }

  settingsSaveName.addEventListener('click', async () => {
    const newName = settingsNameInput.value.trim();
    if (!newName) return;
    try {
      await setDoc(doc(db, "users", currentUser.uid), { name: newName }, { merge: true });
      saveNameStatus.textContent = 'Сохранено';
      setTimeout(() => saveNameStatus.textContent = '', 2000);
    } catch (e) {
      saveNameStatus.textContent = 'Ошибка: ' + e.message;
    }
  });

  function renderUserVerification(myData) {
    if (myData.verified) {
      verificationContent.innerHTML = `<div class="status-pill verified">
        <span class="badge-verified"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.5l4.5 4.5L19 7"/></svg></span>
        Аккаунт верифицирован
      </div>`;
    } else if (myData.verificationRequested) {
      verificationContent.innerHTML = `<div class="status-pill pending">Заявка на рассмотрении</div>`;
    } else {
      verificationContent.innerHTML = `
        <div class="empty-note">Верификация — это отметка, которую выдаёт администратор чата вручную, а не автоматически.</div>
        <button id="request-verification-btn" class="btn secondary" style="width:auto; padding:10px 16px;">Подать заявку</button>
      `;
      document.getElementById('request-verification-btn').addEventListener('click', async () => {
        await setDoc(doc(db, "users", currentUser.uid), { verificationRequested: true }, { merge: true });
        renderUserVerification({ ...myData, verificationRequested: true });
      });
    }
  }

  function renderAdminVerification(pendingDocs) {
    if (pendingDocs.length === 0) {
      verificationContent.innerHTML = '<div class="empty-note">Заявок на верификацию пока нет.</div>';
      return;
    }
    verificationContent.innerHTML = pendingDocs.map(d => {
      const u = d.data();
      return `<div class="admin-user-row" data-uid="${d.id}">
        <div class="who">${escapeHtml(u.name || u.email)}<span class="sub">${escapeHtml(u.email)}</span></div>
        <div style="display:flex; gap:6px;">
          <button class="small-btn approve" data-action="approve" data-uid="${d.id}">Одобрить</button>
          <button class="small-btn reject" data-action="reject" data-uid="${d.id}">Отклонить</button>
        </div>
      </div>`;
    }).join('');
    verificationContent.querySelectorAll('button[data-action]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const uid = btn.dataset.uid;
        const action = btn.dataset.action;
        if (action === 'approve') {
          await setDoc(doc(db, "users", uid), { verified: true, verificationRequested: false }, { merge: true });
        } else {
          await setDoc(doc(db, "users", uid), { verificationRequested: false }, { merge: true });
        }
      });
    });
  }


  function showScreen(el) {
    el.classList.remove('hidden');
    el.classList.remove('screen-enter');
    void el.offsetWidth;
    el.classList.add('screen-enter');
  }

  function chatIdFor(uidA, uidB) { return [uidA, uidB].sort().join('_'); }
  function escapeHtml(str) { const div = document.createElement('div'); div.textContent = str; return div.innerHTML; }
  function formatTime(ts) {
    if (!ts) return '';
    const d = ts.toDate ? ts.toDate() : new Date();
    return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
  }

  function cleanupChat() {
    if (unsubMessages) { unsubMessages(); unsubMessages = null; }
    if (unsubChatDoc) { unsubChatDoc(); unsubChatDoc = null; }
    currentChatId = null; currentChatDocRef = null; peerLastRead = null;
    renderedMsgIds = new Set();
  }

  function tickIcon(read) {
    return `<span class="ticks ${read ? 'read' : ''}"><svg viewBox="0 0 24 12" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M1 6l3 3 5-7"/><path d="M9 6l3 3 5-7"/></svg></span>`;
  }

  let renderedMsgIds = new Set();

  // Полная перерисовка — только при первом открытии чата или когда сообщения реально меняются
  function renderMessages(docs) {
    renderedMsgIds = new Set(docs.map(d => d.id));
    if (docs.length === 0) {
      messagesEl.innerHTML = '<div class="empty-state">Пока пусто. Напишите первое сообщение.</div>';
      return;
    }
    messagesEl.innerHTML = docs.map(docu => bubbleHtml(docu)).join('');
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  // Добавляет только новые сообщения без анимации уже показанных
  function appendNewMessages(docs) {
    if (docs.length === 0) { renderMessages(docs); return; }
    const currentEmpty = messagesEl.querySelector('.empty-state');
    const newDocs = docs.filter(d => !renderedMsgIds.has(d.id));
    if (currentEmpty || renderedMsgIds.size === 0) {
      renderMessages(docs);
      return;
    }
    if (newDocs.length === 0) return; // ничего нового — не трогаем DOM вообще
    newDocs.forEach(docu => {
      renderedMsgIds.add(docu.id);
      messagesEl.insertAdjacentHTML('beforeend', bubbleHtml(docu));
    });
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function bubbleHtml(docu) {
    const m = docu.data();
    const mine = m.senderUid === currentUser.uid;
    const side = mine ? 'me' : 'them';
    let meta = `<span class="time">${formatTime(m.createdAt)}</span>`;
    if (mine) {
      const read = peerLastRead && m.createdAt && m.createdAt.toMillis && peerLastRead.toMillis && m.createdAt.toMillis() <= peerLastRead.toMillis();
      meta = `<span class="time">${formatTime(m.createdAt)}</span>${tickIcon(read)}`;
    }
    const createdMs = m.createdAt && m.createdAt.toMillis ? m.createdAt.toMillis() : 0;
    return `<div class="bubble-row ${side}" data-id="${docu.id}" data-mine="${mine}" data-created="${createdMs}">
      <div>
        <div class="bubble ${side}">${escapeHtml(m.text)}</div>
        <div class="meta-row">${meta}</div>
      </div>
    </div>`;
  }

  // Точечно обновляет галочки "прочитано" у уже отрисованных сообщений — без пересборки DOM
  function updateTicksOnly() {
    messagesEl.querySelectorAll('.bubble-row[data-mine="true"]').forEach(row => {
      const createdMs = Number(row.dataset.created || 0);
      const read = peerLastRead && peerLastRead.toMillis && createdMs && createdMs <= peerLastRead.toMillis();
      const ticksEl = row.querySelector('.ticks');
      if (ticksEl) ticksEl.classList.toggle('read', !!read);
    });
  }

  function openChat(otherUid, otherName, otherVerified) {
    chatsScreen.classList.add('hidden');
    newchatScreen.classList.add('hidden');
    showScreen(chatScreen);
    peerName.textContent = otherName;
    peerAvatar.textContent = otherName.slice(0,1);
    peerBadge.classList.toggle('hidden', !otherVerified);
    chatStatus.textContent = 'в сети';
    chatStatus.classList.remove('typing');

    cleanupChat();
    const chatId = chatIdFor(currentUser.uid, otherUid);
    currentChatId = chatId;
    currentChatDocRef = doc(db, "chats", chatId);
    const messagesColRef = collection(db, "chats", chatId, "messages");
    const q = query(messagesColRef, orderBy("createdAt", "asc"), limit(200));

    let lastDocs = [];

    setDoc(currentChatDocRef, {
      participants: [currentUser.uid, otherUid],
      lastRead: { [currentUser.uid]: serverTimestamp() }
    }, { merge: true }).catch(()=>{});

    unsubChatDoc = onSnapshot(currentChatDocRef, (snap) => {
      const data = snap.data() || {};
      peerLastRead = data.lastRead ? data.lastRead[otherUid] : null;
      updateTicksOnly();

      const peerTyping = data.typing ? data.typing[otherUid] : null;
      if (peerTyping && peerTyping.toMillis && (Date.now() - peerTyping.toMillis()) < 3000) {
        chatStatus.textContent = 'печатает…';
        chatStatus.classList.add('typing');
      } else {
        chatStatus.textContent = 'в сети';
        chatStatus.classList.remove('typing');
      }
    });

    unsubMessages = onSnapshot(q, (snapshot) => {
      connStatus.textContent = '';
      connStatus.classList.remove('error');
      lastDocs = snapshot.docs;
      appendNewMessages(lastDocs);
      setDoc(currentChatDocRef, { lastRead: { [currentUser.uid]: serverTimestamp() } }, { merge: true }).catch(()=>{});
    }, (error) => {
      connStatus.textContent = 'Нет связи: ' + error.message;
      connStatus.classList.add('error');
    });

    async function sendMessage() {
      const text = textInput.value.trim();
      if (!text) return;
      sendBtn.classList.add('sending');
      messagesEl.classList.remove('pulse');
      void messagesEl.offsetWidth;
      messagesEl.classList.add('pulse');
      setTimeout(() => sendBtn.classList.remove('sending'), 300);
      sendBtn.disabled = true;
      textInput.value = '';
      textInput.style.height = 'auto';
      clearTyping();
      try {
        await addDoc(messagesColRef, {
          senderUid: currentUser.uid,
          text: text,
          createdAt: serverTimestamp()
        });
        await setDoc(currentChatDocRef, {
          participants: [currentUser.uid, otherUid],
          lastMessage: text,
          lastMessageAt: serverTimestamp(),
          lastSenderUid: currentUser.uid
        }, { merge: true });
      } catch (e) {
        connStatus.textContent = 'Не отправилось: ' + e.message;
        connStatus.classList.add('error');
      }
    }

    function pushTyping() {
      if (!currentChatDocRef) return;
      setDoc(currentChatDocRef, { typing: { [currentUser.uid]: serverTimestamp() } }, { merge: true }).catch(()=>{});
    }
    function clearTyping() {
      if (!currentChatDocRef) return;
      setDoc(currentChatDocRef, { typing: { [currentUser.uid]: null } }, { merge: true }).catch(()=>{});
    }

    textInput.oninput = () => {
      sendBtn.disabled = textInput.value.trim().length === 0;
      textInput.style.height = 'auto';
      textInput.style.height = Math.min(textInput.scrollHeight, 120) + 'px';
      if (typingTimeout) clearTimeout(typingTimeout);
      if (textInput.value.trim().length > 0) {
        pushTyping();
        typingTimeout = setTimeout(clearTyping, 2500);
      } else {
        clearTyping();
      }
    };
    textInput.onkeydown = (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    };
    sendBtn.onclick = sendMessage;
    textInput.value = '';
    sendBtn.disabled = true;
  }

  backBtn.addEventListener('click', () => {
    if (currentChatDocRef && currentUser) {
      setDoc(currentChatDocRef, { typing: { [currentUser.uid]: null } }, { merge: true }).catch(()=>{});
    }
    cleanupChat();
    chatScreen.classList.add('hidden');
    showScreen(chatsScreen);
  });

  setMode('login');
</script>
</body>
</html>
